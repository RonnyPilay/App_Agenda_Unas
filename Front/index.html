<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f2499a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Juli's Agenda" />
  <meta name="application-name" content="Juli's Agenda" />
  <title>Juli's Agenda</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <h1>Juli's Agenda</h1>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" data-seccion="agenda" onclick="mostrarSeccion('agenda', this)">Agendar turno</button>
        <button class="nav-btn" data-seccion="turnos" onclick="mostrarSeccion('turnos', this)">Calendario y turnos</button>
        <button class="nav-btn" data-seccion="ganancias" onclick="mostrarSeccion('ganancias', this)">Ganancias</button>
      </nav>

      <button
        class="nav-btn install-btn"
        id="instalarAppBtn"
        type="button"
        onclick="solicitarInstalacionPWA()"
        hidden
      >
        Instalar app
      </button>
    </aside>

    <main class="contenido">
      <section id="agenda" class="seccion">
        <div class="section-header">
          <h2>Nuevo turno</h2>
          <p>Completa los datos para registrar una cita.</p>
        </div>

        <div class="glass-card form-card">
          <div class="row g-3">
            <div class="col-12 col-md-6 col-xl-3">
              <label class="form-label">Fecha</label>
              <input type="date" id="fecha" class="form-control" />
              <small id="fechaActualTexto" class="text-muted d-block mt-1"></small>
            </div>

            <div class="col-12 col-md-6 col-xl-3">
              <label class="form-label">Hora</label>
              <input type="time" id="hora" class="form-control" />
            </div>

            <div class="col-12 col-md-6 col-xl-3">
              <label class="form-label">Clienta</label>
              <input type="text" id="nombre" class="form-control" placeholder="Nombre de la clienta" />
            </div>

            <div class="col-12 col-md-6 col-xl-3">
              <label class="form-label">Valor cobrado</label>
              <input type="number" id="valor" class="form-control" min="0" placeholder="0" />
            </div>

            <div class="col-12 col-md-6 col-xl-3">
              <label class="form-label">Ganancia</label>
              <input type="number" id="ganancia" class="form-control" min="0" placeholder="0" />
            </div>

            <div class="col-12">
              <label class="form-label">Detalles</label>
              <textarea id="detalles" class="form-control" rows="3" placeholder="Diseño, color, observaciones..."></textarea>
            </div>

            <div class="col-12 d-flex gap-2 flex-wrap">
              <button class="btn-rosa" onclick="guardarTurno()">Guardar turno</button>
              <button class="btn-secundario" onclick="limpiarFormulario()">Limpiar</button>
            </div>
          </div>
        </div>
      </section>

      <section id="turnos" class="seccion oculto">
        <div class="section-header">
          <h2>Calendario de turnos</h2>
          <p>Toca un día para ver, editar o eliminar turnos.</p>
        </div>

        <div class="glass-card calendar-card">
          <div id="calendar"></div>
        </div>

        <div class="mt-3">
          <input id="buscarInput" class="form-control" placeholder="Buscar clienta..." onkeyup="buscar(this.value)" />
        </div>

        <div id="listaTurnos" class="lista-turnos mt-3"></div>
      </section>

      <section id="ganancias" class="seccion oculto">
        <div class="section-header">
          <h2>Ganancias</h2>
          <p>Filtra por rango de fechas para calcular ingresos y ganancias.</p>
        </div>

        <div class="glass-card">
          <div class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">Desde</label>
              <input type="date" id="gananciaDesde" class="form-control" />
            </div>
            <div class="col-12 col-md-4">
              <label class="form-label">Hasta</label>
              <input type="date" id="gananciaHasta" class="form-control" />
            </div>
            <div class="col-12 col-md-4 d-flex gap-2 flex-wrap">
              <button class="btn-rosa" onclick="calcularGananciasPorRango()">Calcular</button>
              <button class="btn-secundario" onclick="limpiarFiltroGanancias()">Limpiar</button>
            </div>
          </div>

          <div class="ganancias-grid mt-3">
            <article class="ganancia-card">
              <small>Turnos en rango</small>
              <h3 id="totalTurnosRango">0</h3>
            </article>
            <article class="ganancia-card">
              <small>Total ganancia</small>
              <h3 id="totalGananciaRango">$0</h3>
            </article>
          </div>

          <div id="detalleGanancias" class="lista-turnos mt-3"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
